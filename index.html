<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Recepten</title>

<meta name="description" content="Een persoonlijke receptenverzameling met een donker restaurant-thema.">
<meta name="theme-color" content="#C6A15B">

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recepten">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./css/design-tokens.css">
<link rel="stylesheet" href="./css/recipes.css">
</head>
<body>

<header class="app-header">
  <div class="header-text">
    <h1>Mijn Recepten</h1>
    <p class="header-sub" id="recipe-count">Recepten laden…</p>
  </div>
  <button type="button" class="add-btn" id="add-recipe-btn" aria-label="Nieuw recept toevoegen">+</button>
</header>

<main class="recipe-list" id="recipe-list" aria-live="polite" aria-busy="true"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/recipes.js"></script>
</body>
</html>
