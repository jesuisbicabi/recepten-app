<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Recepten</title>

<meta name="description" content="Een persoonlijke receptenverzameling met een donker restaurant-thema.">
<meta name="theme-color" content="#C6A15B">

<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recepten">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./css/design-tokens.css">
<link rel="stylesheet" href="./css/recipes.css">
</head>
<body>

<div id="view-list">
  <header class="app-header">
    <div class="header-text">
      <h1>Mijn Recepten</h1>
      <p class="header-sub" id="recipe-count">Recepten laden…</p>
    </div>
    <button type="button" class="add-btn" id="add-recipe-btn" aria-label="Nieuw recept toevoegen">+</button>
  </header>

  <main class="recipe-list" id="recipe-list" aria-live="polite" aria-busy="true"></main>
</div>

<div id="view-add" hidden>
  <header class="form-header">
    <button type="button" class="back-btn" id="back-to-list-btn" aria-label="Terug naar lijst">←</button>
    <h1>Nieuw recept</h1>
  </header>

  <form class="recipe-form" id="add-recipe-form" novalidate>
    <div class="field">
      <label for="field-title">Titel</label>
      <input type="text" id="field-title" name="title" autocomplete="off" required>
    </div>

    <div class="field">
      <label for="field-description">Beschrijving</label>
      <textarea id="field-description" name="description" rows="4"></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="field-prep-time">Bereidingstijd (min)</label>
        <input type="number" id="field-prep-time" name="prep_time" min="0" inputmode="numeric">
      </div>
      <div class="field">
        <label for="field-servings">Porties</label>
        <input type="number" id="field-servings" name="servings" min="0" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label for="field-highlight-nutrient">Uitgelichte voedingswaarde</label>
      <select id="field-highlight-nutrient" name="highlight_nutrient">
        <option value="">Geen</option>
        <option value="kcal">Kcal per portie</option>
        <option value="protein">Eiwit per portie</option>
        <option value="carbs">Koolhydraten per portie</option>
        <option value="fat">Vet per portie</option>
      </select>
    </div>

    <div class="field">
      <label for="field-image-url">Foto-URL</label>
      <input type="url" id="field-image-url" name="image_url" placeholder="https://…" autocomplete="off">
    </div>

    <p class="form-error" id="form-error" hidden></p>

    <button type="submit" class="save-btn" id="save-recipe-btn">Recept bewaren</button>
  </form>
</div>

<div id="view-detail" hidden>
  <div class="detail-container">
    <div class="hero" id="detail-hero">
      <img class="photo" id="detail-hero-img" alt="" hidden>
      <div class="hero-fallback"><span>🍽</span></div>
      <div class="hero-top">
        <button type="button" class="chip-btn" id="detail-back-btn" aria-label="Terug naar lijst">←</button>
        <button type="button" class="chip-btn" id="detail-photo-btn" aria-label="Foto wijzigen">📷</button>
      </div>
      <div class="hero-caption">
        <div class="kicker" id="detail-kicker">Recept</div>
        <h1 id="detail-title"></h1>
      </div>
    </div>

    <div class="detail-body">
      <div class="detail-meta" id="detail-meta"></div>
      <p class="detail-desc" id="detail-desc" hidden></p>

      <div class="detail-section">
        <h2 class="sec-title">Ingrediënten</h2>
        <p class="sec-placeholder">Komt in de volgende stap</p>
      </div>

      <div class="detail-section">
        <h2 class="sec-title">Bereidingswijze</h2>
        <p class="sec-placeholder">Komt in de volgende stap</p>
      </div>

      <div class="detail-section">
        <h2 class="sec-title">Voedingswaarden</h2>
        <p class="sec-placeholder">Komt in de volgende stap</p>
      </div>
    </div>
  </div>

  <input type="file" id="detail-photo-input" accept="image/*" hidden>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/recipes.js"></script>
<script type="module" src="./js/add-recipe.js"></script>
<script type="module" src="./js/recipe-detail.js"></script>
</body>
</html>
